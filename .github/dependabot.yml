version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1

  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    cooldown:
      semver-patch-days: 28
      semver-minor-days: 90
      semver-major-days: 90
    commit-message:
      prefix: "chore"
    ignore:
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/bun"
        
    groups:      
      patch:
        update-types:
          - "patch"
        exclude-patterns:
          - "@cloudflare/*"
          - "wrangler"

      cloudflare:
        patterns:
          - "@cloudflare/*"
          - "wrangler"

      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"

      react-router:
        patterns:
          - "react-router"
          - "@react-router/*"

      storybook:
        patterns:
          - "@storybook/*"
          - "storybook"

      react-email:
        patterns:
          - "react-email"
          - "@react-email/*"
